name: SoulAgent Release Check

'on':
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-check:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release-check dependencies
        shell: pwsh
        run: python -m pip install -r requirements-dev.txt

      - name: Prepare anonymous release metadata
        shell: pwsh
        run: |
          git remote set-url origin https://github.com/AIXP-Labs/SoulAgent.git
          git config user.name SoulAgent.dev
          git config user.email noreply@SoulAgent.dev

      - name: Run release gate
        shell: pwsh
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\release_check.ps1

      - name: Check patch whitespace
        shell: pwsh
        run: git diff --check

      - name: Ensure release gate is read-only
        shell: pwsh
        run: git diff --exit-code -- .
